name: Trivy Scan

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@v0.35.0
      with:
        image-ref: 'bkimminich/juice-shop'
        severity: 'HIGH,CRITICAL'
        format: 'json'
        exit-code: '1'